name: Refresh lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Regenerar package-lock sem executar scripts
        run: npm install --package-lock-only --ignore-scripts --legacy-peer-deps --no-audit

      - name: Gravar lockfile na branch
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile já está atualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: atualizar lockfile da migração Next.js 15"
          git push origin HEAD:${{ github.head_ref }}

      - name: Gerar relatório JSON da auditoria
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --json > npm-audit.json
          STATUS=$?
          node <<'NODE'
          const fs = require('fs')
          const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'))
          const rows = Object.entries(audit.vulnerabilities || {}).map(([name, item]) => ({
            name,
            severity: item.severity,
            direct: item.isDirect,
            range: item.range,
            fixAvailable: item.fixAvailable,
            via: (item.via || []).map(v => typeof v === 'string' ? v : ({
              source: v.source,
              title: v.title,
              severity: v.severity,
              range: v.range,
              url: v.url
            }))
          }))
          fs.writeFileSync('npm-audit-summary.json', JSON.stringify({ metadata: audit.metadata, vulnerabilities: rows }, null, 2))
          console.log(JSON.stringify(rows, null, 2))
          NODE
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar relatório de auditoria
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit.json
            npm-audit-summary.json
          if-no-files-found: error
          retention-days: 1

      - name: Bloquear vulnerabilidades altas ou críticas
        run: exit "${{ steps.audit.outputs.status }}"
