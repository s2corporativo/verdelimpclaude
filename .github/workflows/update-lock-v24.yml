name: Atualizar lockfile v2.4

on:
  push:
    branches: [feature/erp-completo-v24]
    paths:
      - package.json
      - .github/workflows/update-lock-v24.yml

permissions:
  contents: write

jobs:
  atualizar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/erp-completo-v24
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Atualizar somente o package-lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Validar instalação reproduzível
        run: npm ci --ignore-scripts

      - name: Commitar lockfile se alterado
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile já está atualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Atualizar lockfile para Next 15.5.21"
          git push origin HEAD:feature/erp-completo-v24
