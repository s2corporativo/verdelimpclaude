name: Refresh package lock v3.10.2

on:
  push:
    branches:
      - codex/hotfix-deploy-env-space-v3-10-2-20260724
    paths:
      - package.json
      - .github/workflows/refresh-lock-v3-10-2.yml

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/hotfix-deploy-env-space-v3-10-2-20260724
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Regenerar package-lock
        run: npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: Confirmar PostCSS corrigido
        run: |
          node -e 'const lock=require("./package-lock.json"); const item=lock.packages["node_modules/postcss"]; if (!item || item.version !== "8.5.22") throw new Error(`PostCSS inesperado: ${item?.version}`); console.log(item.version)'

      - name: Commitar lock atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(lock): atualizar PostCSS para 8.5.22"
          git push origin HEAD:codex/hotfix-deploy-env-space-v3-10-2-20260724
