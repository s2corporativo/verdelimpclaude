name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar:
    name: Typecheck, testes, lint, auditoria e build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-somente-testes-nao-usar-em-producao
      SEED_ADMIN_PASSWORD: ci-somente-teste
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Prisma validate (schema íntegro)
        run: npx prisma validate

      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Testes (vitest)
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Sintaxe dos scripts operacionais
        run: bash -n deploy/contabo/*.sh

      - name: Validar Docker Compose
        run: |
          cp .env.vps.example .env.production
          ln -sf .env.production .env
          docker compose config --quiet

      - name: Auditoria de dependências de produção (alta+)
        run: npm audit --omit=dev --audit-level=high

      - name: Build de produção
        run: npm run build

  migrations:
    name: Migrations aplicam num PostgreSQL real
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: verdelimp_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/verdelimp_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-somente-testes-nao-usar-em-producao
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: migrate deploy (cadeia completa)
        run: npx prisma migrate deploy

      - name: Validar schema após migrations
        run: npx prisma validate

      - name: Seed executa
        run: npm run prisma:seed
        env:
          SEED_ADMIN_PASSWORD: ci-somente-teste
