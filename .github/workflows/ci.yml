name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar:
    name: Typecheck, testes, lint, auditoria e build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-somente-testes-nao-usar-em-producao
      SEED_ADMIN_PASSWORD: ci-somente-teste
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Prisma validate (schema íntegro)
        run: npx prisma validate

      - name: TypeScript (capturar relatório)
        run: |
          set +e
          npx tsc --noEmit > typescript-report.txt 2>&1
          echo $? > typescript-exit-code.txt
          cat typescript-report.txt
          exit 0

      - name: Preservar relatório TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-report
          path: |
            typescript-report.txt
            typescript-exit-code.txt
          if-no-files-found: error
          retention-days: 14

      - name: Validar resultado TypeScript
        run: test "$(cat typescript-exit-code.txt)" = "0"

      - name: Testes (vitest)
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Sintaxe dos scripts operacionais
        run: bash -n deploy/contabo/*.sh

      - name: Validar Docker Compose
        run: |
          cp .env.vps.example .env.production
          ln -sf .env.production .env
          docker compose config --quiet

      - name: Auditoria de dependências de produção (capturar relatório)
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > npm-audit-report.json
          echo $? > npm-audit-exit-code.txt
          node -e 'const fs=require("fs"); const r=JSON.parse(fs.readFileSync("npm-audit-report.json","utf8")); console.log(JSON.stringify({metadata:r.metadata,vulnerabilities:r.vulnerabilities},null,2))'
          exit 0

      - name: Preservar auditoria npm
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit-report.json
            npm-audit-exit-code.txt
          if-no-files-found: error
          retention-days: 14

      - name: Build de produção
        run: npm run build

      - name: Validar auditoria de dependências
        run: test "$(cat npm-audit-exit-code.txt)" = "0"

  migrations:
    name: Migrations aplicam num PostgreSQL real
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: verdelimp_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/verdelimp_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-somente-testes-nao-usar-em-producao
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: migrate deploy (cadeia completa)
        run: npx prisma migrate deploy

      - name: Validar schema após migrations
        run: npx prisma validate

      - name: Seed executa
        run: npm run prisma:seed
        env:
          SEED_ADMIN_PASSWORD: ci-somente-teste

      - name: Validar seed estrutural e vínculo comercial
        run: |
          node <<'NODE'
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();

          async function main() {
            const [diretoria, demoEmployees, demoVehicles] = await Promise.all([
              prisma.role.count({ where: { name: 'DIRETORIA' } }),
              prisma.employee.count({
                where: {
                  OR: [
                    { id: { startsWith: 'demo-' } },
                    { id: { in: ['emp-1','emp-2','emp-3','emp-4','emp-5','emp-6','emp-7','emp-8'] } },
                  ],
                },
              }),
              prisma.vehicle.count({
                where: {
                  OR: [
                    { id: { startsWith: 'demo-' } },
                    { id: { in: ['veh-1','veh-2','veh-3'] } },
                  ],
                },
              }),
            ]);

            if (diretoria !== 1) throw new Error(`Papel DIRETORIA inválido: ${diretoria}`);
            if (demoEmployees !== 0) throw new Error(`Seed criou ${demoEmployees} funcionário(s) demonstrativo(s)`);
            if (demoVehicles !== 0) throw new Error(`Seed criou ${demoVehicles} veículo(s) demonstrativo(s)`);

            const [column] = await prisma.$queryRawUnsafe(`
              SELECT EXISTS (
                SELECT 1 FROM information_schema.columns
                WHERE table_name = 'ServiceDossier' AND column_name = 'opportunityId'
              ) AS exists
            `);
            const [foreignKey] = await prisma.$queryRawUnsafe(`
              SELECT EXISTS (
                SELECT 1 FROM pg_constraint
                WHERE conname = 'ServiceDossier_opportunityId_fkey'
              ) AS exists
            `);
            const triggers = await prisma.$queryRawUnsafe(`
              SELECT tgname FROM pg_trigger
              WHERE tgname IN ('trg_service_dossier_sync_opportunity','trg_proposal_sync_opportunity')
                AND NOT tgisinternal
            `);

            if (!column?.exists) throw new Error('Coluna ServiceDossier.opportunityId ausente');
            if (!foreignKey?.exists) throw new Error('FK demanda-dossiê ausente');
            if (triggers.length !== 2) throw new Error(`Triggers do pipeline incompletos: ${triggers.length}/2`);

            console.log('Seed estrutural e vínculo demanda-dossiê validados.');
          }

          main()
            .catch((error) => {
              console.error(error);
              process.exitCode = 1;
            })
            .finally(() => prisma.$disconnect());
          NODE
