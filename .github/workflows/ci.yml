name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    name: Typecheck, testes, lint e schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Prisma validate (schema íntegro)
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Testes (vitest)
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Auditoria de dependências (produção, alta+)
        run: npm audit --omit=dev --audit-level=high || echo "::warning::npm audit encontrou vulnerabilidades — revisar"

  migrations:
    name: Migrations aplicam num Postgres real
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: verdelimp_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/verdelimp_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: migrate deploy (cadeia completa)
        run: npx prisma migrate deploy
      - name: Sem drift entre migrations e schema
        run: npx prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code
      - name: Seed executa
        run: npm run prisma:seed
        env:
          SEED_ADMIN_PASSWORD: ci-somente-teste
