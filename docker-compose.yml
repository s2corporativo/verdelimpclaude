# Projeto nomeado para não colidir com outros compose da mesma VPS (EJC, S2, site)
name: verdelimp

services:
  db:
    image: postgres:16-alpine
    container_name: verdelimp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verdelimp_erp}
      POSTGRES_USER: ${POSTGRES_USER:-verdelimp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env.production}
    volumes:
      - verdelimp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verdelimp} -d ${POSTGRES_DB:-verdelimp_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviços utilitários: usam o estágio builder, que contém Prisma CLI,
  # dependências e scripts. Não ficam em execução permanente.
  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-verdelimp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-verdelimp_erp}?schema=public
    command: ["npx", "prisma", "migrate", "deploy"]

  seed:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-verdelimp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-verdelimp_erp}?schema=public
    command: ["npm", "run", "prisma:seed"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verdelimp-erp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-verdelimp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-verdelimp_erp}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      # VPS compartilhada: a porta 3000 costuma estar ocupada por outros apps.
      # APP_PORT define a porta no host (padrão 3010); dentro do container segue 3000.
      - "127.0.0.1:${APP_PORT:-3010}:3000"
    volumes:
      - verdelimp_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  verdelimp_postgres_data:
  verdelimp_uploads:
