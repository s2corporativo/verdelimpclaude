# Nginx reverse proxy para Verdelimp ERP em VPS Contabo
# Substitua erp.seudominio.com.br pelo domínio real.

server {
    listen 80;
    server_name erp.seudominio.com.br;

    # Uploads de XML de NF-e e documentos do GED
    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Depois de emitir SSL com Certbot, o próprio Certbot pode criar o bloco HTTPS.
# Comando sugerido:
# certbot --nginx -d erp.seudominio.com.br
